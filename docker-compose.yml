version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "YOUR_PASSWORD"
      POSTGRES_DB: financial_ri
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:YOUR_PASSWORD@db:5432/financial_ri
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev_secret
      - ENVIRONMENT=docker
    depends_on:
      - db
      - redis
    command: uvicorn main:app --host 0.0.0.1 --port 8000 --reload

volumes:
  postgres_data:
