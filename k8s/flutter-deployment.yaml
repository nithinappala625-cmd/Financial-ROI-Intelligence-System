apiVersion: apps/v1
kind: Deployment
metadata:
  name: roi-flutter-dashboard
  labels:
    app: roi-flutter-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roi-flutter-dashboard
  template:
    metadata:
      labels:
        app: roi-flutter-dashboard
    spec:
      containers:
      - name: flutter-dashboard
        image: financial-roi/flutter-dashboard:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: roi-flutter-dashboard-svc
spec:
  selector:
    app: roi-flutter-dashboard
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: LoadBalancer
