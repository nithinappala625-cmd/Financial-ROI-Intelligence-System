apiVersion: apps/v1
kind: Deployment
metadata:
  name: roi-backend
  labels:
    app: roi-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: roi-api
  template:
    metadata:
      labels:
        app: roi-api
    spec:
      containers:
      - name: fastapi
        image: financial-roi/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: uri
        - name: REDIS_URL
          value: "redis://redis-svc:6379/0"
---
apiVersion: v1
kind: Service
metadata:
  name: roi-backend-svc
spec:
  selector:
    app: roi-api
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
  type: LoadBalancer
