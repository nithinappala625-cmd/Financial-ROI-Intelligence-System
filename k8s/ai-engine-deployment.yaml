apiVersion: apps/v1
kind: Deployment
metadata:
  name: roi-ai-engine
  labels:
    app: roi-ai-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roi-ai-engine
  template:
    metadata:
      labels:
        app: roi-ai-engine
    spec:
      containers:
      - name: ai-engine
        image: financial-roi/ai-engine:latest
        ports:
        - containerPort: 8001
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-svc:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: roi-ai-engine-svc
spec:
  selector:
    app: roi-ai-engine
  ports:
  - port: 80
    targetPort: 8001
    protocol: TCP
